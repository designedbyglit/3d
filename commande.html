<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configurer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="clouds"></div>

<header class="header">

<a href="index.html" class="logo">
<img src="logo.png">
</a>

</header>


<section class="commande">

<div class="commande-container">


<div class="form-left">

<h2>Configurer ta pièce</h2>

<label>Nom</label>
<input type="text">

<label>Email</label>
<input type="email">

<label>Moteur</label>

<select>
<option>AM6</option>
<option>Derbi</option>
</select>

<label>Type de pièce</label>

<select>
<option>Cache allumage</option>
<option>Cache obturateur</option>
<option>Récupérateur</option>
</select>

<label>Texte</label>
<input type="text">

<label>Logo</label>
<input type="file">

<label>Détails</label>
<textarea></textarea>

<button class="cta">Envoyer</button>

</div>


<div class="form-right">

<h3>Couleurs</h3>

<div class="color-picker">

<div class="color" data-color="#ff0000" style="background:#ff0000"></div>
<div class="color" data-color="#0000ff" style="background:#0000ff"></div>
<div class="color" data-color="#00ff00" style="background:#00ff00"></div>
<div class="color" data-color="#ffffff" style="background:#ffffff"></div>

</div>

<div id="viewer"></div>

</div>

</div>

</section>


<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/STLLoader.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script src="script.js"></script>
